<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Confirmation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <style>
        .confirmation-card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-color);
        }
        .counter-badge {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.5rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Submission Confirmed</h1>
    </header>

    <main>
        <div class="confirmation-card">
            <h2>Thank you for your feedback!</h2>
            <p>Your product review has been successfully submitted and recorded.</p>
            
            <div id="review-counter-display" class="counter-badge">
                Total Reviews Submitted: <span id="counter-value">0</span>
            </div>
        </div>
    </main>
    <footer>
    <p>&copy;
        <span id="currentyear"></span>
        Lorenzo Iván Salamanca Córdoba| Ciudad Juárez, Chihuahua, México</p>
    </footer>
    <script>
        const year = new Date().getFullYear();
        
        document.getElementById("currentyear").textContent = year;
        document.addEventListener("DOMContentLoaded", () => {
            let reviewCount = parseInt(localStorage.getItem("reviewCount")) || 0;
            reviewCount++;
            localStorage.setItem("reviewCount", reviewCount);
            document.getElementById("counter-value").textContent = reviewCount;
        });
    </script>
</body>
</html>
